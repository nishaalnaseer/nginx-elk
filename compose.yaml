services:
  nginx:
    image: nginx:logged_nginx
    ports:
      - "80:80"
    volume:
      - "test_logs:/test_logs"
      - "./nginx/nginx.conf:/etc/nginx/nginx.conf"
      - "./nginx/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf"
      - "./nginx/filebeat.yml:/home/nginx/filebeat/filebeat.yml"

volumes:
  test_logs:
    external: true
    name: test_logs
